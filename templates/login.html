{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - MedSalud</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --surface-color: #ffffff;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --accent-teal: #14b8a6;
            --accent-teal-dark: #0f766e;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .login-container {
            background-color: var(--surface-color);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .brand-logo-svg {
            margin-bottom: 20px;
            color: var(--accent-teal);
        }

        .login-title {
            font-size: 1.5rem;
            margin: 0 0 5px 0;
            font-weight: 600;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-teal);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
        }

        .btn-primary {
            width: 100%;
            background-color: var(--accent-teal);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: var(--accent-teal-dark);
        }

        .alert-error {
            background-color: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: left;
        }

        .system-tags {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .tag {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <svg class="brand-logo-svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" fill="rgba(20, 184, 166, 0.1)"></rect>
            <path d="M12 8v8M8 12h8" stroke="var(--accent-teal)" stroke-width="2.5"></path>
        </svg>
        
        <h1 class="login-title">MedSalud Control</h1>
        <p class="login-subtitle">Ingrese sus credenciales de acceso</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-error">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Usuario Institucional</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-primary">Ingresar al Sistema</button>
        </form>

        <div class="system-tags">
            <span class="tag">🏥 Urgencias</span>
            <span class="tag">💊 Farmacia</span>
        </div>
    </div>

</body>
</html>
